<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="sxm13" />
    <title id="title"></title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap"
        rel="stylesheet" />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- For Compatability -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    
    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

    <!-- Blog Gallery Styles -->
    <style>
        /* ── Blog card grid ── */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }

        .blog-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.28s ease, box-shadow 0.28s ease;
            cursor: pointer;
        }

        .blog-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.14);
        }

        .blog-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .blog-card-body {
            padding: 1rem 1.2rem 1.3rem;
        }

        .blog-card-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: #e8f0fe;
            color: #3b6de8;
            border-radius: 50px;
            padding: 2px 10px;
            margin-bottom: 0.5rem;
        }

        .blog-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.35rem;
            line-height: 1.4;
        }

        .blog-card-date {
            font-size: 0.78rem;
            color: #888;
        }

        .blog-card-desc {
            font-size: 0.88rem;
            color: #555;
            margin-top: 0.5rem;
            line-height: 1.55;
        }

        /* ── Lightbox ── */
        .blog-lightbox-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2rem;
        }

        .blog-lightbox-overlay.active {
            display: flex;
        }

        .blog-lightbox-img {
            max-width: 90vw;
            max-height: 70vh;
            border-radius: 10px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        .blog-lightbox-caption {
            color: #fff;
            margin-top: 1.2rem;
            font-size: 1rem;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
        }

        .blog-lightbox-close {
            position: absolute;
            top: 1.2rem;
            right: 1.8rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .blog-lightbox-close:hover { opacity: 1; }

        /* Section title spacing fix */
        #blogs-subtitle .bi { margin-right: 0.4rem; }
    </style>
</head>

<body id="page-top">
    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold" href="#page-top"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#page-top">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#publications">PUBLICATIONS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#awards">AWARDS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#blogs">BLOGS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#tools">TOOLS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section" style="background-image: url('static/assets/img/NUS1.png');">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 id="top-section-bg-text" class="text-white display-3 lh-1 font-alt"></h2>
            </div>
        </div>
    </section>

    <!-- Photo -->
    <div class="container px-5">
        <div id="avatar">
            <img class="shadow" src="static/assets/img/carton.jpg">
        </div>
    </div>
    
    <!-- Home -->
    <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="home">
        <div class="container px-5">
            <header>
                <h2 id="home-subtitle"> </h2>
            </header>
            <div class="main-body" id="home-md"></div>
        </div>
    </section>

    <!-- Publications -->
    <section class="bg-gradient-primary-to-secondary-gray mt5 md5" id="publications">
        <div class="container px-5">
            <header>
                <h2 id="publications-subtitle"><i class="bi bi-file-text-fill"></i>&nbsp;PUBLICATIONS</h2>
            </header>
            <div class="main-body" id="publications-md"></div>
        </div>
    </section>

    <!-- Awards -->
    <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="awards">
        <div class="container px-5">
            <header>
                <h2 id="awards-subtitle"><i class="bi bi-award-fill"></i>AWARDS</h2>
            </header>
            <div class="main-body" id="awards-md"></div>
        </div>
    </section>

    <!-- ★ Blogs Section ★ -->
    <section class="bg-gradient-primary-to-secondary-gray mt5 md5" id="blogs">
        <div class="container px-5">
            <header>
                <h2 id="blogs-subtitle"><i class="bi bi-journal-richtext"></i>&nbsp;BLOGS</h2>
            </header>
            <div class="main-body" id="blogs-md"></div>
        </div>
    </section>

    <!-- Tools Section -->
    <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="tools">
        <div class="container px-5">
            <header>
                <h2 id="tools-subtitle"><i class="bi bi-tools"></i>&nbsp;TOOLS</h2>
            </header>
            <div class="main-body" id="tools-md"></div>
        </div>
    </section>

    <!-- Footer-->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
                <a id="github-link" href="https://github.com/sxm13">Github</a>
                <span class="mx-1">&middot;</span>
                <a id="license-link" href="https://github.com/sxm13/GuobinZhao.github.io/blob/main/LICENSE">License</a>
            </div>
        </div>
    </footer>

    <!-- Lightbox overlay -->
    <div class="blog-lightbox-overlay" id="blogLightbox">
        <span class="blog-lightbox-close" id="lightboxClose">&times;</span>
        <img class="blog-lightbox-img" id="lightboxImg" src="" alt="">
        <div class="blog-lightbox-caption" id="lightboxCaption"></div>
    </div>

    <script>
        /* ── Load tools.md ── */
        document.addEventListener("DOMContentLoaded", () => {
            fetch("contents/tools.md")
                .then(r => r.text())
                .then(md => { document.getElementById("tools-md").innerHTML = marked.parse(md); })
                .catch(e => console.error("Error loading tools.md:", e));
        });

        /* ── Load blogs.md and render blog cards ── */
        document.addEventListener("DOMContentLoaded", () => {
            fetch("contents/blogs.md")
                .then(r => r.text())
                .then(md => {
                    // Parse blog entries: each entry is separated by "---"
                    const entries = parseBlogEntries(md);
                    const grid = document.createElement("div");
                    grid.className = "blog-grid";

                    entries.forEach(entry => {
                        const card = document.createElement("div");
                        card.className = "blog-card";
                        card.innerHTML = `
                            <img src="${entry.image}" alt="${entry.title}" loading="lazy"
                                 onerror="this.src='static/assets/img/placeholder.jpg'">
                            <div class="blog-card-body">
                                <span class="blog-card-tag">${entry.tag}</span>
                                <div class="blog-card-title">${entry.title}</div>
                                <div class="blog-card-date">${entry.date}</div>
                                <div class="blog-card-desc">${entry.desc}</div>
                            </div>`;
                        card.addEventListener("click", () => openLightbox(entry.image, entry.title, entry.desc));
                        grid.appendChild(card);
                    });

                    document.getElementById("blogs-md").appendChild(grid);
                })
                .catch(e => {
                    console.error("Error loading blogs.md:", e);
                    document.getElementById("blogs-md").innerHTML =
                        "<p style='color:#888;'>Blog entries could not be loaded.</p>";
                });
        });

        /* ── Simple front-matter parser for blogs.md ──
           Each blog entry looks like:

           ## Title
           - date: YYYY-MM-DD
           - tag: Life
           - image: static/assets/img/blog/xxx.jpg
           - desc: Short description text.

           ---
        */
        function parseBlogEntries(md) {
            const blocks = md.split(/\n---\n/).map(b => b.trim()).filter(Boolean);
            return blocks.map(block => {
                const titleMatch = block.match(/^##\s+(.+)/m);
                const dateMatch  = block.match(/^-\s*date:\s*(.+)/m);
                const tagMatch   = block.match(/^-\s*tag:\s*(.+)/m);
                const imageMatch = block.match(/^-\s*image:\s*(.+)/m);
                const descMatch  = block.match(/^-\s*desc:\s*([\s\S]+?)(?=\n-\s|\n##|$)/m);
                return {
                    title: titleMatch  ? titleMatch[1].trim()  : "Untitled",
                    date:  dateMatch   ? dateMatch[1].trim()   : "",
                    tag:   tagMatch    ? tagMatch[1].trim()    : "Blog",
                    image: imageMatch  ? imageMatch[1].trim()  : "",
                    desc:  descMatch   ? descMatch[1].trim()   : "",
                };
            });
        }

        /* ── Lightbox ── */
        function openLightbox(src, title, desc) {
            document.getElementById("lightboxImg").src = src;
            document.getElementById("lightboxCaption").innerHTML =
                `<strong>${title}</strong><br>${desc}`;
            document.getElementById("blogLightbox").classList.add("active");
        }

        document.getElementById("lightboxClose").addEventListener("click", () => {
            document.getElementById("blogLightbox").classList.remove("active");
        });
        document.getElementById("blogLightbox").addEventListener("click", function(e) {
            if (e.target === this) this.classList.remove("active");
        });
    </script>
</body>
</html>
